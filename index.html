<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Support</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #080a0f;
            --grid-color: rgba(48, 54, 61, 0.4);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border: #30363d;
            --success: #238636;
            --accent: #58a6ff;
            --anim-speed: 500ms;
        }

        /* Moving Cyber-Grid Background */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 8s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-color) 85%);
            pointer-events: none;
        }

        .container { width: 100%; max-width: 700px; padding: 20px; z-index: 10; position: relative; }

        .row {
            opacity: 0;
            transform: translateY(30px);
            visibility: hidden;
            transition: opacity var(--anim-speed) ease, transform var(--anim-speed) ease, visibility var(--anim-speed);
            margin-bottom: 12px;
        }

        .row.in { opacity: 1; transform: translateY(0); visibility: visible; }
        .row.out { opacity: 0 !important; transform: translateY(30px) !important; visibility: hidden !important; }

        .step { display: none; flex-direction: column; }
        .step.active { display: flex; }

        h2 { font-size: 2.2rem; margin: 0; color: #fff; letter-spacing: -0.5px; }
        p { color: var(--text-dim); margin: 10px 0 30px 0; font-size: 1.1rem; }

        .badge-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .badge {
            display: flex; align-items: center; border-radius: 10px; cursor: pointer;
            transition: transform 0.15s ease, filter 0.2s; overflow: hidden; border: none;
        }
        .badge:hover { transform: scale(1.05); filter: brightness(1.1); }
        .icon-wrap { padding-left: 20px; display: flex; align-items: center; }
        .icon-wrap img { width: 32px; height: 32px; pointer-events: none; }
        .badge .label { padding: 16px 24px 16px 14px; font-size: 20px; font-weight: 800; pointer-events: none; }

        input, textarea {
            background: rgba(22, 27, 34, 0.9); border: 1px solid var(--border); border-radius: 8px;
            color: #fff; padding: 18px; font-size: 18px; width: 100%; box-sizing: border-box; 
            outline: none; font-family: inherit; backdrop-filter: blur(5px);
        }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            flex: 1; padding: 16px; border-radius: 8px; cursor: pointer;
            font-weight: 700; font-size: 16px; transition: 0.2s; border: 1px solid var(--border);
            font-family: inherit;
        }
        .btn-primary { background: var(--success); color: #fff; border: none; }
        .btn-secondary { background: #21262d; color: var(--text-main); }

        .result-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
            padding: 40px 0;
        }

        .summary { flex: 1; }
        .info-label { font-size: 13px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; letter-spacing: 1px; }
        .info-value { font-size: 26px; margin-bottom: 32px; color: #fff; word-break: break-all; font-family: inherit; font-weight: 500; }

        .qr-wrapper { position: relative; display: flex; align-items: center; justify-content: center; }
        .orbit-container {
            position: relative;
            width: 340px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qr-code {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            width: 220px;
            height: 220px;
            z-index: 5;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .orbit-wave {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--accent);
            animation: orbitRotate 4s linear infinite;
            opacity: 0.6;
        }

        .orbit-wave:nth-child(2) {
            animation-duration: 2.5s;
            animation-direction: reverse;
            border-top-color: var(--success);
            border-bottom-color: var(--success);
            transform: scale(1.1);
        }

        @keyframes orbitRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 650px) {
            .result-layout { flex-direction: column-reverse; text-align: center; gap: 40px; }
            .orbit-container { width: 300px; height: 300px; }
            #qr-code { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="step" id="step-1">
        <div class="row"><h2>Select Asset</h2></div>
        <div class="row"><p>Choose your preferred cryptocurrency to continue.</p></div>
        <div class="row"><div class="badge-grid" id="badge-grid"></div></div>
    </div>

    <div class="step" id="step-2">
        <div class="row"><h2>Donation Amount</h2></div>
        <div class="row"><p>How much would you like to contribute? (USD)</p></div>
        <div class="row"><input type="number" id="usd-input" placeholder="0.00"></div>
        <div class="row">
            <div class="btn-group">
                <button class="btn-secondary" onclick="transitionTo(1)">Back</button>
                <button class="btn-primary" onclick="transitionTo(3)">Continue</button>
            </div>
        </div>
    </div>

    <div class="step" id="step-3">
        <div class="row"><h2>Final Details</h2></div>
        <div class="row"><p>Add an optional public note or your name.</p></div>
        <div class="row"><textarea id="memo-input" rows="3" placeholder="Message (Optional)"></textarea></div>
        <div class="row">
            <div class="btn-group">
                <button class="btn-secondary" onclick="transitionTo(2)">Back</button>
                <button class="btn-primary" onclick="handleGenerate()">Generate Address</button>
            </div>
        </div>
    </div>

    <div class="step" id="step-4">
        <div class="row"><h2>Scan to Pay</h2></div>
        <div class="row">
            <div class="result-layout">
                <div class="summary">
                    <div class="info-label">Amount</div>
                    <div class="info-value" id="res-amount"></div>
                    <div class="info-label">To Address</div>
                    <div class="info-value" id="res-address"></div>
                    <div id="memo-display">
                        <div class="info-label">Memo</div>
                        <div class="info-value" id="res-memo"></div>
                    </div>
                </div>
                <div class="qr-wrapper">
                    <div class="orbit-container">
                        <div class="orbit-wave"></div>
                        <div class="orbit-wave"></div>
                        <div id="qr-code"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const myAddresses = {
        "BTC": "bc1qjfpmgj5n9s6cn6mjze7em7vs42fvx4kufc8nuk", 
        "ETH": "0xB88c0dfAd5981bfa5e613496089EB51A94000F9C", 
        "SOL": "FF2K6d2a3sxMtc8LUEghF27DXNQAURMXXf3ccvjkUgUk",
        "XMR": "89fsmuQUsnA3fAjW6oiZskPzGYGDk1L2TjRZuUhkLXMujb8js9fH8rmTpaKTcpKv8pSpxG4Xi5UQnLBbhXbEnARGGUDEpfA", 
        "BNB": "0xB88c0dfAd5981bfa5e613496089EB51A94000F9C", 
        "USDC": "0xB88c0dfAd5981bfa5e613496089EB51A94000F9C",
        "XRP": "rNdrwQa3eFeN3koN1B434h5gAWi89uzXpA", 
        "TRX": "TU7tzZMPcJyhwrQMwXgXZp6sxQArbotHbe", 
        "DOGE": "DJmq174FTQEFuRLcqm44Lpk1PeoomfukyR", 
        "SUI": "0x703088fe89263c2bd382d628432f30273e94e2d7a417abe2762d87043c95040b"
    };

    const coins = [
        { sym: "BTC", id: "bitcoin", color: "#F7931A", lightText: false },
        { sym: "ETH", id: "ethereum", color: "#627EEA", lightText: false },
        { sym: "SOL", id: "solana", color: "#14F195", lightText: true },
        { sym: "XMR", id: "monero", color: "#FF6600", lightText: false },
        { sym: "BNB", id: "binancecoin", color: "#F3BA2F", lightText: true },
        { sym: "USDC", id: "usd-coin", color: "#2775CA", lightText: false },
        { sym: "XRP", id: "ripple", color: "#23292F", lightText: false },
        { sym: "TRX", id: "tron", color: "#FF0013", lightText: false },
        { sym: "DOGE", id: "dogecoin", color: "#C2A633", lightText: false },
        { sym: "SUI", id: "sui", color: "#6FBCF0", lightText: true }
    ];

    let currentCoin = null;
    let currentStep = 1;
    const staggerTime = 250;

    window.onload = () => {
        renderBadges();
        document.querySelectorAll('.row').forEach(r => r.classList.add('out'));
        animateIn(1);
    };

    function renderBadges() {
        const container = document.getElementById('badge-grid');
        coins.forEach(coin => {
            const b = document.createElement('div');
            b.className = 'badge';
            b.style.backgroundColor = coin.color;
            const textColor = coin.lightText ? '#000000' : '#FFFFFF';
            b.innerHTML = `<div class="icon-wrap"><img src="./icons/${coin.sym.toLowerCase()}.svg"></div>
                           <div class="label" style="color: ${textColor}">${coin.sym}</div>`;
            b.onclick = () => { currentCoin = coin; transitionTo(2); };
            container.appendChild(b);
        });
    }

    async function animateIn(stepNum) {
        const step = document.getElementById(`step-${stepNum}`);
        step.style.display = 'flex';
        const rows = step.querySelectorAll('.row');
        setTimeout(() => {
            rows.forEach((row, i) => {
                setTimeout(() => {
                    row.classList.remove('out');
                    row.classList.add('in');
                }, i * staggerTime); 
            });
        }, 100); 
    }

    async function animateOut(stepNum) {
        const step = document.getElementById(`step-${stepNum}`);
        const rows = Array.from(step.querySelectorAll('.row')).reverse();
        return new Promise(resolve => {
            rows.forEach((row, i) => {
                setTimeout(() => {
                    row.classList.remove('in');
                    row.classList.add('out');
                    if (i === rows.length - 1) {
                        setTimeout(() => {
                            step.style.display = 'none';
                            resolve();
                        }, 500); 
                    }
                }, i * staggerTime);
            });
        });
    }

    async function transitionTo(nextStep) {
        await animateOut(currentStep);
        currentStep = nextStep;
        animateIn(nextStep);
    }

    async function handleGenerate() {
        const usd = document.getElementById('usd-input').value;
        if (!usd || usd <= 0) return alert("Please enter an amount.");
        
        try {
            // CoinGecko Simple Price API
            const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${currentCoin.id}&vs_currencies=usd`);
            const data = await response.json();
            const price = data[currentCoin.id].usd;

            if(!price || isNaN(price)) throw new Error();

            const cryptoAmt = (usd / price).toFixed(6);
            
            document.getElementById('res-amount').innerText = `${cryptoAmt} ${currentCoin.sym}`;
            document.getElementById('res-address').innerText = myAddresses[currentCoin.sym];
            
            const memo = document.getElementById('memo-input').value;
            document.getElementById('memo-display').style.display = memo ? 'block' : 'none';
            if(memo) document.getElementById('res-memo').innerText = memo;

            const qrContainer = document.getElementById('qr-code');
            qrContainer.innerHTML = '';
            
            let uri = `${currentCoin.sym.toLowerCase()}:${myAddresses[currentCoin.sym]}?amount=${cryptoAmt}`;
            if(currentCoin.sym === 'XMR') uri = `monero:${myAddresses[currentCoin.sym]}?tx_amount=${cryptoAmt}`;

            new QRCode(qrContainer, {
                text: uri,
                width: 220, height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff"
            });

            transitionTo(4);
        } catch (e) {
            alert("Error fetching price from CoinGecko.");
        }
    }
</script>
</body>
</html>
